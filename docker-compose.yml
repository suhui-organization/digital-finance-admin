# =============================================================================
# digital-finance-admin 独立部署文件
# 镜像来源: SWR (华为云容器镜像服务)
# 依赖: go-backend + ai-service 已就绪 (通过 external network 通信)
# =============================================================================
version: "3.8"

services:
  admin:
    image: swr.ap-southeast-3.myhuaweicloud.com/digital-finance-commercial/admin:${TAG:-latest}
    container_name: df-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-16010}:16010"
    environment:
      NODE_ENV: production
      PORT: "16010"
      HOSTNAME: "0.0.0.0"
      # 通过 Nginx Gateway 统一访问后端 API（服务端 rewrites 使用）
      # NEXT_PUBLIC_API_BASE_URL 在 Dockerfile 构建时已 baked 为空字符串，禁止运行时覆盖
      API_GATEWAY_URL: "http://nginx:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - df-network

networks:
  df-network:
    name: digital-finance-network
    external: true